document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +

      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');

    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

margin: 0 auto; padding: 40px 24px 4px;\">\n      <div style=\"text-align: center;\">\n        <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 11.5px; color: #6FB0B8; letter-spacing: 0.05em;\">STEP 1 OF 2<\u002Fdiv>\n        <h1 style=\"font-size: 30px; font-weight: 600; letter-spacing: -0.02em; margin: 10px 0 0; line-height: 1.14; color: #F3F7F7;\">What tasks did we give the models?<\u002Fh1>\n        <p style=\"font-size: 15.5px; color: #B7C8CB; line-height: 1.6; max-width: 560px; margin: 12px auto 0;\">Slide through the ten prompts and pick the ones you want to compare. They collect at the bottom \u2014 hit Continue when you're ready.<\u002Fp>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ notLoaded }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"margin-top: 30px; text-align: center; font-family: 'IBM Plex Mono', monospace; color: #a09c93; font-size: 13px;\">Loading benchmark data\u2026<\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ loaded }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"display: flex; align-items: center; gap: 6px; margin-top: 20px;\">\n        <button sc-camel-on-click=\"{{ onW1Prev }}\" style=\"{{ w1PrevStyle }}\" style-hover=\"transform: translateX(-4px); color: #3D7E8C; border-color: #C9DED9;\">\u2039<\u002Fbutton>\n        <div style=\"flex: 1; min-width: 0; overflow: hidden; padding: 26px 0;\">\n          <div style=\"{{ w1TrackStyle }}\">\n            <sc-for list=\"{{ w1Cards }}\" as=\"card\" hint-placeholder-count=\"3\">\n              <div sc-camel-on-click=\"{{ card.onClick }}\" style=\"{{ card.cardStyle }}\">\n                <div style=\"{{ card.numberStyle }}\">{{ card.number }}<\u002Fdiv>\n                <div style=\"{{ card.typeStyle }}\">{{ card.typeLabel }}<\u002Fdiv>\n                <div style=\"font-size: 23px; font-weight: 600; letter-spacing: -0.015em; margin-top: 14px; color: #2C3A42;\">{{ card.title }}<\u002Fdiv>\n                <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #a7a296; margin-top: 7px;\">{{ card.metaLine }}<\u002Fdiv>\n                <div class=\"scrolly\" style=\"{{ card.bodyBoxStyle }}\">{{ card.body }}<\u002Fdiv>\n                <sc-if value=\"{{ card.active }}\" hint-placeholder-val=\"{{ true }}\">\n                  <button sc-camel-on-click=\"{{ card.onToggle }}\" style=\"{{ card.selectBtnStyle }}\">{{ card.selectBtnLabel }}<\u002Fbutton>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <button sc-camel-on-click=\"{{ onW1Next }}\" style=\"{{ w1NextArrowStyle }}\" style-hover=\"transform: translateX(4px); color: #3D7E8C; border-color: #C9DED9;\">\u203a<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"display: flex; justify-content: center; align-items: center; gap: 6px; margin-top: 14px; flex-wrap: wrap;\">\n        <sc-for list=\"{{ w1Dots }}\" as=\"d\" hint-placeholder-count=\"10\">\n          <button sc-camel-on-click=\"{{ d.onClick }}\" style=\"{{ d.styleObj }}\" title=\"{{ d.title }}\"><\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <div style=\"margin-top: 26px; border-top: 1px solid rgba(255,255,255,0.10); padding-top: 20px;\">\n        <div style=\"display: flex; align-items: center; justify-content: space-between; gap: 14px; flex-wrap: wrap;\">\n          <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.05em; color: #8FA6AB; text-transform: uppercase;\">Selected tasks \u2014 {{ w1SelCount }}<\u002Fdiv>\n          <button sc-camel-on-click=\"{{ onGoStep2 }}\" style=\"{{ continueBtnStyle }}\">Continue to models \u2192<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"display: flex; flex-wrap: wrap; gap: 10px; margin-top: 14px;\">\n          <sc-for list=\"{{ selectedCards }}\" as=\"sc\" hint-placeholder-count=\"2\">\n            <div style=\"display: flex; align-items: center; gap: 11px; background: #FFFFFF; border: 1px solid #E4DED2; border-radius: 12px; padding: 9px 10px 9px 14px; box-shadow: 0 2px 8px -5px rgba(44,58,66,0.2);\">\n              <span style=\"{{ sc.dotStyle }}\"><\u002Fspan>\n              <div>\n                <div style=\"font-size: 13.5px; font-weight: 600; color: #2C3A42;\">{{ sc.title }}<\u002Fdiv>\n                <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #a09c93; margin-top: 1px;\">{{ sc.meta }}<\u002Fdiv>\n              <\u002Fdiv>\n              <button sc-camel-on-click=\"{{ sc.onRemove }}\" style=\"border: none; background: #F5F0E8; color: #8a8880; width: 22px; height: 22px; border-radius: 999px; cursor: pointer; font-size: 14px; line-height: 1; flex: 0 0 auto;\">\u00d7<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n          <sc-if value=\"{{ w1NoSelection }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"font-size: 13.5px; color: #93A7AC; padding: 8px 2px;\">Nothing selected yet \u2014 pick tasks above to continue.<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===================== WIZARD STEP 2 : MODELS ===================== -->\n    <sc-if value=\"{{ stageW2 }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"max-width: 1040px; margin: 0 auto; padding: 40px 32px 4px;\">\n      <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 11.5px; color: #6FB0B8; letter-spacing: 0.05em;\">STEP 2 OF 2<\u002Fdiv>\n      <h1 style=\"font-size: 30px; font-weight: 600; letter-spacing: -0.02em; margin: 10px 0 0; line-height: 1.14; color: #F3F7F7;\">Select models to compare<\u002Fh1>\n      <p style=\"font-size: 15.5px; color: #B7C8CB; line-height: 1.6; max-width: 640px; margin: 12px 0 0;\">Line up two to four models side by side. Click a slot to choose a model \u2014 you can swap any of them later on the board.<\u002Fp>\n\n      <div style=\"display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-top: 24px;\">\n        <span style=\"font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.05em; color: #8FA6AB; text-transform: uppercase;\">Quick sets<\u002Fspan>\n        <sc-for list=\"{{ quickSets }}\" as=\"q\" hint-placeholder-count=\"3\">\n          <button sc-camel-on-click=\"{{ q.onClick }}\" style=\"{{ q.styleObj }}\">{{ q.label }}<\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <div style=\"display: flex; gap: 16px; flex-wrap: wrap; margin-top: 16px;\">\n        <sc-for list=\"{{ modelSlots }}\" as=\"slot\" hint-placeholder-count=\"3\">\n          <div style=\"flex: 1 1 240px; min-width: 240px;\">\n            <sc-if value=\"{{ slot.filled }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"border: 1px solid #C9DED9; background: #FFFFFF; border-radius: 16px; padding: 18px 18px; min-height: 150px; display: flex; flex-direction: column;\">\n                <div style=\"display: flex; align-items: flex-start; gap: 10px;\">\n                  <span style=\"{{ slot.dotStyle }}\"><\u002Fspan>\n                  <div style=\"flex: 1; min-width: 0;\">\n                    <div style=\"font-size: 15px; font-weight: 600; letter-spacing: -0.01em;\">{{ slot.name }}<\u002Fdiv>\n                    <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; color: #a09c93; margin-top: 2px;\">{{ slot.org }}<\u002Fdiv>\n                  <\u002Fdiv>\n                  <button sc-camel-on-click=\"{{ slot.onClear }}\" style=\"border: none; background: #F1EBE0; color: #8a8880; width: 24px; height: 24px; border-radius: 999px; cursor: pointer; font-size: 15px; line-height: 1; flex: 0 0 auto;\">\u00d7<\u002Fbutton>\n                <\u002Fdiv>\n                <div style=\"font-size: 13px; color: #6b7178; line-height: 1.5; margin-top: 12px; flex: 1;\">{{ slot.desc }}<\u002Fdiv>\n                <button sc-camel-on-click=\"{{ slot.onClick }}\" style=\"align-self: flex-start; margin-top: 10px; border: none; background: none; color: #3D7E8C; font-family: 'IBM Plex Mono', monospace; font-size: 11.5px; font-weight: 500; cursor: pointer; padding: 0;\">Change model<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ slot.isEmpty }}\" hint-placeholder-val=\"{{ true }}\">\n              <button sc-camel-on-click=\"{{ slot.onClick }}\" style=\"width: 100%; min-height: 150px; border: 1.5px dashed #D8D2C6; background: #FBFAF7; border-radius: 16px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 11px; color: #9a978f;\">\n                <span style=\"width: 36px; height: 36px; border-radius: 999px; background: #F1EBE0; display: flex; align-items: center; justify-content: center; font-size: 21px; color: #8a8880;\">+<\u002Fspan>\n                <span style=\"font-size: 14px; font-weight: 500; color: #7a8087;\">Select a model<\u002Fspan>\n              <\u002Fbutton>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n        <sc-if value=\"{{ canAddSlot }}\" hint-placeholder-val=\"{{ false }}\">\n          <button sc-camel-on-click=\"{{ onAddSlot }}\" style=\"flex: 0 0 auto; width: 92px; min-height: 150px; border: 1.5px dashed #D8D2C6; background: #FBFAF7; border-radius: 16px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; color: #9a978f; font-size: 12px;\"><span style=\"font-size: 22px;\">+<\u002Fspan>Add<\u002Fbutton>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <div style=\"display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-top: 28px; flex-wrap: wrap;\">\n        <button sc-camel-on-click=\"{{ onBackStep1 }}\" style=\"border: 1px solid #E4DED2; background: #FFFFFF; color: #6b7178; font-size: 14px; font-weight: 500; padding: 10px 18px; border-radius: 10px; cursor: pointer;\">\u2190 Back to tasks<\ x; cursor: pointer; user-select: none;\">\n              <span style=\"{{ hlTrackStyle }}\"><span style=\"{{ hlKnobStyle }}\"><\u002Fspan><\u002Fspan>\n              <span style=\"font-size: 12.5px; color: #6b7178; font-weight: 500; white-space: nowrap;\">Highlight leanest<\u002Fspan>\n            <\u002Flabel>\n          <\u002Fdiv>\n          <div style=\"display: flex; align-items: center; gap: 8px; flex-wrap: wrap;\">\n            <sc-for list=\"{{ modelSlots }}\" as=\"slot\" hint-placeholder-count=\"3\">\n              <sc-if value=\"{{ slot.filled }}\" hint-placeholder-val=\"{{ false }}\">\n                <div sc-camel-on-click=\"{{ slot.onClick }}\" style=\"display: inline-flex; align-items: center; gap: 8px; padding: 6px 8px 6px 11px; border: 1px solid #C9DED9; background: #F4F9F8; border-radius: 999px; cursor: pointer;\" title=\"Click to change model\">\n                  <span style=\"{{ slot.dotStyle }}\"><\u002Fspan>\n                  <span style=\"font-size: 13px; font-weight: 600;\">{{ slot.name }}<\u002Fspan>\n                  <button sc-camel-on-click=\"{{ slot.onClear }}\" style=\"border: none; background: #E4EEEC; color: #6a8a86; width: 19px; height: 19px; border-radius: 999px; cursor: pointer; font-size: 13px; line-height: 1; flex: 0 0 auto;\">\u00d7<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ slot.isEmpty }}\" hint-placeholder-val=\"{{ true }}\">\n                <button sc-camel-on-click=\"{{ slot.onClick }}\" style=\"display: inline-flex; align-items: center; gap: 6px; padding: 7px 13px; border: 1.5px dashed #D8D2C6; background: #FBFAF7; border-radius: 999px; cursor: pointer; color: #8a8880; font-size: 13px;\"><span style=\"font-size: 15px;\">+<\u002Fspan> add model<\u002Fbutton>\n              <\u002Fsc-if>\n            <\u002Fsc-for>\n            <sc-if value=\"{{ canAddSlot }}\" hint-placeholder-val=\"{{ false }}\">\n              <button sc-camel-on-click=\"{{ onAddSlot }}\" style=\"width: 30px; height: 30px; border-radius: 999px; border: 1.5px dashed #D8D2C6; background: #FBFAF7; color: #8a8880; cursor: pointer; font-size: 16px; line-height: 1;\">+<\u002Fbutton>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"height: 1px; background: #F0EADF;\"><\u002Fdiv>\n        <div>\n          <div style=\"display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 10px;\">\n            <span style=\"font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; letter-spacing: 0.05em; color: #8a8880; text-transform: uppercase;\">Use cases \u2014 {{ ucCount }}<\u002Fspan>\n            <button sc-camel-on-click=\"{{ onEditUcs }}\" style=\"border: 1px solid #E4DED2; background: #FBF9F5; color: #3D7E8C; font-size: 12.5px; font-weight: 500; padding: 7px 12px; border-radius: 9px; cursor: pointer;\">+ Add or edit tasks<\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"display: flex; flex-wrap: wrap; gap: 8px;\">\n            <sc-for list=\"{{ ucChips }}\" as=\"uc\" hint-placeholder-count=\"3\">\n              <div style=\"display: inline-flex; align-items: center; gap: 8px; padding: 6px 8px 6px 12px; border: 1px solid #E4DED2; border-radius: 999px; background: #FBF9F5;\">\n                <button sc-camel-on-click=\"{{ uc.onJump }}\" style=\"border: none; background: none; cursor: pointer; display: inline-flex; align-items: center; gap: 7px; padding: 0;\">\n                  <span style=\"font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 600; color: {{ uc.tagColor }};\">{{ uc.tag }}<\u002Fspan>\n                  <span style=\"font-size: 13px; color: #3A454C;\">{{ uc.title }}<\u002Fspan>\n                <\u002Fbutton>\n                <button sc-camel-on-click=\"{{ uc.onRemove }}\" style=\"border: none; background: #F5F0E8; color: #9a978f; width: 20px; height: 20px; border-radius: 999px; cursor: pointer; font-size: 13px; line-height: 1; flex: 0 0 auto;\">\u00d7<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n            <sc-if value=\"{{ noUcsBoard }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font-size: 13px; color: #a09c93; padding: 6px 2px;\">No use cases selected.<\u002Fdiv><\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ noModels }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"border: 1px dashed #E4DED2; border-radius: 14px; padding: 48px; text-align: center; color: #a09c93; font-family: 'IBM Plex Mono', monospace; font-size: 13px; margin-top: 22px;\">Open \u201cEdit selection\u201d to add models.<\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ noUcsBoardMain }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"border: 1px dashed #E4DED2; border-radius: 14px; padding: 48px; text-align: center; color: #a09c93; font-family: 'IBM Plex Mono', monospace; font-size: 13px; margin-top: 22px;\">Open \u201cEdit selection\u201d to add tasks.<\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ hasActive }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"position: sticky; top: 59px; z-index: 30; background: rgba(20,44,49,0.92); backdrop-filter: blur(8px); padding: 12px 0 12px; margin-top: 8px; box-shadow: 0 10px 16px -14px rgba(44,58,66,0.22);\">\n          <div style=\"{{ gridStyle }}\">\n            <sc-for list=\"{{ activeBlock.cols }}\" as=\"col\" hint-placeholder-count=\"3\">\n              <div style=\"{{ col.headerStyle }}\">\n                <div>\n                  <div style=\"font-size: 15px; font-weight: 600; letter-spacing: -0.01em;\">{{ col.modelName }}<\u002Fdiv>\n                  <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; color: #a09c93; margin-top: 2px;\">{{ col.org }}<\u002Fdiv>\n                <\u002Fdiv>\n                <span style=\"{{ col.tsBadgeStyle }}\" title=\"{{ col.tsDesc }}\">{{ col.tsLabel }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display: flex; align-items: stretch; gap: 12px; margin-top: 16px;\">\n          <button sc-camel-on-click=\"{{ onUcPrev }}\" style=\"{{ ucPrevStyle }}\" style-hover=\"transform: translateX(-4px); color: #3D7E8C; border-color: #C9DED9;\">\u2039<\u002Fbutton>\n          <div style=\"position: relative; overflow: hidden; flex: 1; min-width: 0; background: #FFFFFF; border: 1px solid #EBE5DA; border-radius: 20px; padding: 24px 28px; box-shadow: 0 10px 30px -18px rgba(44,58,66,0.2); display: flex; flex-direction: column;\">\n            <div style=\"{{ activeTaskCard.numberStyle }}\">{{ activeTaskCard.number }}<\u002Fdiv>\n            <div style=\"{{ activeTaskCard.typeStyle }}\">{{ activeTaskCard.typeLabel }}<\u002Fdiv>\n            <div style=\"font-size: 22px; font-weight: 600; letter-spacing: -0.015em; margin-top: 12px; color: #2C3A42;\">{{ activeTaskCard.title }}<\u002Fdiv>\n            <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #a7a296; margin-top: 6px;\">{{ activeTaskCard.metaLine }}<\u002Fdiv>\n            <div class=\"scrolly\" style=\"background: #FAF8F3; border-radius: 10px; padding: 14px 16px; font-size: 14px; line-height: 1.62; color: #3A454C; white-space: pre-wrap; max-height: 150px; overflow-y: auto; margin-top: 14px;\">{{ activeTaskCard.body }}<\u002Fdiv>\n          <\u002Fdiv>\n          <button sc-camel-on-click=\"{{ onUcNext }}\" style=\"{{ ucNextStyle }}\" style-hover=\"transform: translateX(4px); color: #3D7E8C; border-color: #C9DED9;\">\u203a<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"display: flex; justify-content: center; align-items: center; gap: 6px; margin-top: 12px; flex-wrap: wrap;\">\n          <sc-for list=\"{{ ucDots }}\" as=\"d\" hint-placeholder-count=\"3\">\n            <button sc-camel-on-click=\"{{ d.onClick }}\" style=\"{{ d.styleObj }}\" title=\"{{ d.title }}\"><\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <div style=\"margin-top: 18px;\">\n          <div style=\"{{ gridStyle }}\">\n            <sc-for list=\"{{ activeBlock.cols }}\" as=\"col\" hint-placeholder-count=\"3\">\n              <div style=\"{{ col.contentCardStyle }}\">\n                <div style=\"padding: 16px 17px 14px; border-bottom: 1px solid #F0EADF;\">\n                  <div style=\"display: flex; align-items: baseline; justify-content: space-between; gap: 8px;\">\n                    <span style=\"font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.06em; color: #9a978f; text-transform: uppercase;\">Reasoning tokens<\u002Fspan>\n                    <sc-if value=\"{{ col.bestReas }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-family: 'IBM Plex Mono', monospace; font-size: 9.5px; font-weight: 600; color: #2A6F4F; background: #E7F2EC; padding: 2px 6px; border-radius: 5px;\">LEANEST<\u002Fspan><\u002Fsc-if>\n                  <\u002Fdiv>\n                  <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 25px; font-weight: 600; color: #2C3A42; margin-top: 3px; line-height: 1;\">{{ col.reasFmt }}<\u002Fdiv>\n                  <div style=\"height: 6px; background: #F0EADF; border-radius: 4px; margin-top: 10px; overflow: hidden;\"><div style=\"{{ col.reasBarStyle }}\"><\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n\n                <div style=\"padding: 16px 17px; border-bottom: 1px solid #F0EADF;\">\n                  <div style=\"display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 9px;\">\n                    <span style=\"font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.05em; color: #9a978f; text-transform: uppercase;\">Reasoning trace \u00b7 {{ col.langLabel }}<\u002Fspan>\n                    <sc-if value=\"{{ col.hasReasoning }}\" hint-placeholder-val=\"{{ true }}\"><button sc-camel-on-click=\"{{ col.onToggleExpand }}\" style=\"font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; color: #3D7E8C; background: none; border: none; cursor: pointer; padding: 0; font-weight: 500;\">{{ col.expandLabel }}<\u002Fbutton><\u002Fsc-if>\n                  <\u002Fdiv>\n                  <sc-if value=\"{{ col.warning }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; color: #b0752e; background: #FBEFD8; padding: 6px 9px; border-radius: 7px; line-height: 1.45; margin-bottom: 9px;\">\u26a0 {{ col.warning }}<\u002Fdiv><\u002Fsc-if>\n                  <sc-if value=\"{{ col.hasReasoning }}\" hint-placeholder-val=\"{{ true }}\">\n                    <div style=\"position: relative;\">\n                      <div class=\"scrolly\" style=\"{{ col.reasPanelStyle }}\">{{ col.reasoning }}<\u002Fdiv>\n                      <sc-if value=\"{{ col.showFade }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"position: absolute; left: 0; right: 0; bottom: 0; height: 46px; background: linear-gradient(to bottom, rgba(252,250,247,0), #FCFAF7); pointer-events: none; border-radius: 0 0 9px 9px;\"><\u002Fdiv><\u002Fsc-if>\n                    <\u002Fdiv>\n                  <\u002Fsc-if>\n                  <sc-if value=\"{{ col.noReasoning }}\" hint-placeholder-val=\"{{ false }}\">\n                    <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 11.5px; color: #a5a199; background: #F7F3EC; border: 1px dashed #E4DED2; padding: 14px; border-radius: 9px; text-align: center;\">{{ col.noReasonText }}<\u002Fdiv>\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n\n                <div style=\"padding: 14px 17px; border-bottom: 1px solid #F0EADF;\">\n                  <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.05em; color: #9a978f; text-transform: uppercase; margin-bottom: 8px;\">Answer<\u002Fdiv>\n                  <div class=\"scrolly\" style=\"max-height: 200px; overflow-y: auto; font-size: 13px; line-height: 1.62; color: #384249; white-space: pre-wrap; padding-right: 6px;\">{{ col.answer }}<\u002Fdiv>\n                <\u002Fdiv>\n\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"margin-top: 18px; border: 1px solid #EBE5DA; background: #FFFFFF; border-radius: 16px; overflow: hidden;\">\n          <div style=\"{{ dataHeadStyle }}\">\n            <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.05em; color: #9a978f; text-transform: uppercase;\">Model data<\u002Fdiv>\n            <sc-for list=\"{{ activeBlock.cols }}\" as=\"col\" hint-placeholder-count=\"3\">\n              <div style=\"display: flex; align-items: center; gap: 8px; min-width: 0;\">\n                <span style=\"{{ col.dataDotStyle }}\"><\u002Fspan>\n                <span style=\"font-size: 13px; font-weight: 600; color: #2C3A42; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;\">{{ col.modelName }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <sc-for list=\"{{ dataRows }}\" as=\"row\" hint-placeholder-count=\"6\">\n            <div style=\"{{ dataRowStyle }}\">\n              <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #8a8880; letter-spacing: 0.02em;\">{{ row.label }}<\u002Fdiv>\n              <sc-for list=\"{{ row.cells }}\" as=\"cell\" hint-placeholder-count=\"3\">\n                <div style=\"display: flex; align-items: center; gap: 8px;\">\n                  <span style=\"{{ cell.style }}\">{{ cell.text }}<\u002Fspan>\n                  <sc-if value=\"{{ cell.hasBadge }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-family: 'IBM Plex Mono', monospace; font-size: 9px; font-weight: 600; color: #2A6F4F; background: #E7F2EC; padding: 2px 6px; border-radius: 5px; text-transform: uppercase;\">{{ cell.badge }}<\u002Fspan><\u002Fsc-if>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fmain>\n  <\u002Fsc-if>\n\n  <!-- ===================== LEADERBOARD ===================== -->\n  <sc-if value=\"{{ isLeaderboard }}\" hint-placeholder-val=\"{{ false }}\">\n  <main>\n    <div style=\"max-width: 1180px; margin: 0 auto; padding: 44px 32px 4px;\">\n      <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 11.5px; color: #6FB0B8; letter-spacing: 0.04em;\">BENCHMARK / LEADERBOARD<\u002Fdiv>\n      <h1 style=\"font-size: 33px; font-weight: 600; letter-spacing: -0.022em; margin: 12px 0 0; max-width: 780px; line-height: 1.13; color: #F3F7F7;\">The whole panel, ranked<\u002Fh1>\n      <p style=\"font-size: 16.5px; color: #B7C8CB; line-height: 1.62; max-width: 730px; margin: 16px 0 0;\">Twelve models across ten light tasks and three heavy ones. Sort by any metric. Correctness is near-uniform \u2014 almost every model passes every graded task \u2014 so the leaderboard ranks what actually separates them: how many tokens they burn, what that costs, and how much of the thinking is waste.<\u002Fp>\n    <\u002Fdiv>\n\n    <div style=\"max-width: 1180px; margin: 22px auto 0; padding: 0 32px; display: flex; gap: 10px; flex-wrap: wrap;\">\n      <button sc-camel-on-click=\"{{ onToggleGlossary }}\" style=\"{{ glossaryBtnStyle }}\">{{ glossaryBtnLabel }}<\u002Fbutton>\n      <button sc-camel-on-click=\"{{ onToggleReport }}\" style=\"{{ reportBtnStyle }}\">{{ reportBtnLabel }}<\u002Fbutton>\n    <\u002Fdiv>\n\n    <sc-if value=\"{{ showGlossary }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"max-width: 1180px; margin: 14px auto 0; padding: 0 32px;\">\n        <div style=\"border: 1px solid #EBE5DA; background: #FFFFFF; border-radius: 16px; padding: 8px 4px;\">\n          <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 2px 0;\">\n            <sc-for list=\"{{ glossary }}\" as=\"g\" hint-placeholder-count=\"7\">\n              <div style=\"padding: 16px 20px; border-bottom: 1px solid #F3EEE4;\">\n                <div style=\"font-size: 14px; font-weight: 600; color: #2C3A42; margin-bottom: 5px;\">{{ g.t }}<\u002Fdiv>\n                <div style=\"font-size: 13px; color: #6b7178; line-height: 1.58;\">{{ g.d }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ showReport }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"max-width: 1180px; margin: 14px auto 0; padding: 0 32px;\">\n        <div style=\"border: 1px solid #E6D9C4; background: #FBF6EC; border-radius: 16px; padding: 22px 24px;\">\n          <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.05em; color: #b0752e; text-transform: uppercase; margin-bottom: 4px;\">From the study<\u002Fdiv>\n          <div style=\"font-size: 18px; font-weight: 600; letter-spacing: -0.01em; margin-bottom: 16px;\">What the experiment found<\u002Fdiv>\n          <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 18px 28px;\">\n            <sc-for list=\"{{ insights }}\" as=\"ins\" hint-placeholder-count=\"6\">\n              <div style=\"border-left: 2px solid #E0B76A; padding-left: 15px;\">\n                <div style=\"font-size: 14.5px; font-weight: 600; color: #2C3A42; margin-bottom: 5px;\">{{ ins.t }}<\u002Fdiv>\n                <div style=\"font-size: 13px; color: #6b6455; line-height: 1.6;\">{{ ins.d }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <div style=\"max-width: 1180px; margin: 22px auto 0; padding: 0 32px;\">\n      <div style=\"display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;\">\n        <span style=\"font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.05em; color: #8FA6AB; text-transform: uppercase; margin-right: 4px;\">Task type<\u002Fspan>\n        <sc-for list=\"{{ filterChips }}\" as=\"f\" hint-placeholder-count=\"7\">\n          <button sc-camel-on-click=\"{{ f.onClick }}\" style=\"{{ f.styleObj }}\">{{ f.label }}<\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ notLoaded }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"font-family: 'IBM Plex Mono', monospace; color: #a09c93; font-size: 13px; padding: 30px 4px;\">Loading benchmark data\u2026<\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ loaded }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"border: 1px solid #EBE5DA; background: #FFFFFF; border-radius: 16px; overflow: hidden;\">\n        <div style=\"display: grid; grid-template-columns: 44px 1.6fr repeat(6, 1fr); align-items: center; padding: 13px 20px; border-bottom: 1px solid #EFE9DE; background: #FBF9F5;\">\n          <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #a09c93;\">#<\u002Fdiv>\n          <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; letter-spacing: 0.04em; color: #8a8880; text-transform: uppercase;\">Model<\u002Fdiv>\n          <sc-for list=\"{{ columns }}\" as=\"c\" hint-placeholder-count=\"6\">\n            <button sc-camel-on-click=\"{{ c.onClick }}\" style=\"{{ c.headStyle }}\" title=\"{{ c.hint }}\">{{ c.label }}{{ c.arrow }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <sc-for list=\"{{ rows }}\" as=\"row\" hint-placeholder-count=\"8\">\n          <div style=\"{{ row.rowStyle }}\">\n            <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 14px; font-weight: 600; color: {{ row.rankColor }};\">{{ row.rank }}<\u002Fdiv>\n            <div style=\"display: flex; align-items: center; gap: 11px;\">\n              <span style=\"{{ row.dotStyle }}\"><\u002Fspan>\n              <div>\n                <div style=\"font-size: 14.5px; font-weight: 600; letter-spacing: -0.01em;\">{{ row.name }}<\u002Fdiv>\n                <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #a09c93; margin-top: 1px;\">{{ row.org }} \u00b7 {{ row.tsWord }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"{{ row.reasCellStyle }}\"><div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 13.5px; color: #2C3A42;\">{{ row.reasFmt }}<\u002Fdiv><div style=\"height: 4px; background: #F0EADF; border-radius: 3px; margin-top: 5px; overflow: hidden;\"><div style=\"{{ row.reasBar }}\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n            <div style=\"{{ row.outCellStyle }}\"><div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 13.5px; color: #2C3A42;\">{{ row.outFmt }}<\u002Fdiv><div style=\"height: 4px; background: #F0EADF; border-radius: 3px; margin-top: 5px; overflow: hidden;\"><div style=\"{{ row.outBar }}\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n            <div style=\"{{ row.costCellStyle }}\" title=\"{{ row.costTitle }}\"><div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 13.5px; color: #2C3A42;\">{{ row.costFmt }}{{ row.costIndicativeMark }}<\u002Fdiv><div style=\"height: 4px; background: #F0EADF; border-radius: 3px; margin-top: 5px; overflow: hidden;\"><div style=\"{{ row.costBar }}\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n            <div style=\"{{ row.redCellStyle }}\"><span style=\"font-family: 'IBM Plex Mono', monospace; font-size: 14px; font-weight: 600; color: {{ row.redColor }};\">{{ row.redFmt }}<\u002Fspan><\u002Fdiv>\n            <div style=\"{{ row.cohCellStyle }}\"><span style=\"font-family: 'IBM Plex Mono', monospace; font-size: 14px; color: #3D7E8C;\">{{ row.cohFmt }}<\u002Fspan><\u002Fdiv>\n            <div style=\"{{ row.corrCellStyle }}\"><span style=\"font-family: 'IBM Plex Mono', monospace; font-size: 12.5px; color: #2A6F4F; background: #E7F2EC; padding: 3px 9px; border-radius: 6px;\">{{ row.corrFmt }}<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"display: flex; gap: 22px; flex-wrap: wrap; margin-top: 14px; font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #a09c93;\">\n        <span>Redundancy &amp; Coherence 1\u20135 \u00b7 lower / higher is better<\u002Fspan>\n        <span>Totals across {{ includedCount }} use case(s)<\u002Fspan>\n        <span>\u2014 = trace hidden, not scored<\u002Fspan>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fmain>\n  <\u002Fsc-if>\n\n  <!-- ===================== MODEL PICKER OVERLAY ===================== -->\n  <sc-if value=\"{{ pickerOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div sc-camel-on-click=\"{{ onClosePicker }}\" style=\"position: fixed; inset: 0; z-index: 100; background: rgba(24,30,33,0.42); display: flex; align-items: center; justify-content: center; padding: 24px;\">\n      <div sc-camel-on-click=\"{{ onStopProp }}\" style=\"width: 460px; max-width: 100%; max-height: 82vh; background: #FFFFFF; border-radius: 18px; box-shadow: 0 24px 60px rgba(24,30,33,0.32); display: flex; flex-direction: column; overflow: hidden;\">\n        <div style=\"display: flex; align-items: center; justify-content: space-between; padding: 18px 20px; border-bottom: 1px solid #F0EADF;\">\n          <div style=\"font-size: 16px; font-weight: 600;\">Select a model<\u002Fdiv>\n          <button sc-camel-on-click=\"{{ onClosePicker }}\" style=\"border: none; background: #F5F0E8; color: #6b7178; width: 28px; height: 28px; border-radius: 999px; cursor: pointer; font-size: 16px; line-height: 1;\">\u00d7<\u002Fbutton>\n        <\u002Fdiv>\n        <div class=\"scrolly\" style=\"overflow-y: auto; padding: 8px;\">\n          <sc-for list=\"{{ pickerModels }}\" as=\"pm\" hint-placeholder-count=\"8\">\n            <button sc-camel-on-click=\"{{ pm.onClick }}\" style=\"{{ pm.rowStyle }}\">\n              <span style=\"{{ pm.dotStyle }}\"><\u002Fspan>\n              <span style=\"flex: 1; min-width: 0; text-align: left;\">\n                <span style=\"display: block; font-size: 14px; font-weight: 600; color: #2C3A42;\">{{ pm.name }}<\u002Fspan>\n                <span style=\"display: block; font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #8a8880; margin-top: 2px;\">{{ pm.org }} \u00b7 {{ pm.desc }}<\u002Fspan>\n              <\u002Fspan>\n              <span style=\"{{ pm.tagStyle }}\">{{ pm.stateLabel }}<\u002Fspan>\n            <\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;: {&quot;width&quot;: 1280, &quot;height&quot;: 920}, &quot;startView&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;compare&quot;, &quot;leaderboard&quot;], &quot;default&quot;: &quot;compare&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Defaults&quot;}, &quot;highlightBest&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Defaults&quot;}, &quot;showFindings&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: false, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Defaults&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    view: null,\n    loaded: false,\n    loadErr: null,\n    stage: 'w1',\n    slots: [null, null, null],\n    selPrompts: [],\n    w1idx: 0,\n    activeUc: 0,\n    pickerSlot: null,\n    ucMenuOpen: false,\n    editOpen: false,\n    highlight: null,\n    expanded: {},\n    sortKey: 'redundancy',\n    sortDir: 'asc',\n    typeFilter: 'all',\n    showGlossary: false,\n    showReport: null,\n  };\n\n  MODELS = [\n    { id: 'deepseek_v4', name: 'DeepSeek V4', org: 'DeepSeek', dot: '#3D7E8C' },\n    { id: 'glm_5_2', name: 'GLM 5.2', org: 'Zhipu', dot: '#72BDC5' },\n    { id: 'kimi_k2_7', name: 'Kimi K2.7', org: 'Moonshot', dot: '#E07A54' },\n    { id: 'gpt_5_5', name: 'GPT-5.5', org: 'OpenAI', dot: '#2C3A42' },\n    { id: 'claude_sonnet_4_6', name: 'Claude Sonnet 4.6', org: 'Anthropic', dot: '#D4952A' },\n    { id: 'gemma_4', name: 'Gemma 4', org: 'Google', dot: '#F0A08A' },\n    { id: 'opus_4_8', name: 'Claude Opus 4.8', org: 'Anthropic', dot: '#8a6d3b' },\n    { id: 'mistral_medium_3_5', name: 'Mistral Med 3.5', org: 'Mistral', dot: '#E8694A' },\n    { id: 'kimi_k3', name: 'Kimi K3', org: 'Moonshot', dot: '#C4603A' },\n    { id: 'inkling', name: 'Inkling', org: 'Thinking Machines', dot: '#4E93A0' },\n    { id: 'gpt_5_6_sol', name: 'GPT-5.6 Sol', org: 'OpenAI', dot: '#4A5860' },\n    { id: 'fable_5', name: 'Claude Fable 5', org: 'Anthropic', dot: '#B8862B' },\n  ];\n\n  DESC = {\n    deepseek_v4: 'Thinks in Danish \u00b7 mid redundancy',\n    glm_5_2: 'Leanest, tightest trace',\n    kimi_k2_7: 'Token-heavy \u00b7 circles a lot',\n    gpt_5_5: 'Hidden trace \u00b7 count only',\n    claude_sonnet_4_6: 'Summarized trace \u00b7 very few reasoning tokens',\n    gemma_4: 'Open English anchor \u00b7 tight',\n    opus_4_8: 'Hidden trace \u00b7 few reasoning tokens',\n    mistral_medium_3_5: 'Most tokens \u00b7 most redundant',\n  };\n\n  QUICK = [\n    { label: 'Lean reasoners', ids: ['glm_5_2', 'gemma_4', 'deepseek_v4'] },\n    { label: 'Token-heavy', ids: ['mistral_medium_3_5', 'kimi_k2_7', 'deepseek_v4'] },\n    { label: 'Hidden vs raw', ids: ['gpt_5_5', 'claude_sonnet_4_6', 'deepseek_v4'] },\n  ];\n\n  PROMPTS = [\n    { id: 'P1', n: 1, title: 'Plain-language explainer', sub: 'Folkeregister address, \u2264120 words', type: 'Natural language', tkey: 'da_natural_language', load: 'Low' },\n    { id: 'P2', n: 2, title: 'Rewrite into plain language', sub: 'Legalese \u2192 citizen-friendly', type: 'Natural language', tkey: 'da_natural_language', load: 'Low' },\n    { id: 'P3', n: 3, title: 'Appeal deadline', sub: 'Administrative law, date reasoning', type: 'Legal', tkey: 'da_legal', load: 'High' },\n    { id: 'P4', n: 4, title: 'Sick-pay decision', sub: 'Administrative law, due process', type: 'Legal', tkey: 'da_legal', load: 'Very high' },\n    { id: 'P5', n: 5, title: 'Train travel time', sub: 'Two-leg arithmetic', type: 'Math', tkey: 'math', load: 'High' },\n    { id: 'P6', n: 6, title: 'Race ordering', sub: 'Constraint deduction', type: 'Logic', tkey: 'logic', load: 'High' },\n    { id: 'P7', n: 7, title: 'Text \u2192 JSON', sub: 'Schema-bound structuring', type: 'Code', tkey: 'code_structure', load: 'Medium' },\n    { id: 'P8', n: 8, title: 'Python bug fix', sub: 'Find & fix the defect', type: 'Code', tkey: 'code_bug', load: 'High' },\n    { id: 'P9', n: 9, title: 'Self-host an open LLM?', sub: 'Open pros-and-cons analysis', type: 'Open analysis', tkey: 'da_open_analysis', load: 'High' },\n    { id: 'P10', n: 10, title: 'Which AI initiative?', sub: 'Open trade-off analysis', type: 'Open analysis', tkey: 'da_open_analysis', load: 'High' },\n    { id: 'H1', n: 11, title: 'Largest prime \u2192 digit sum', sub: 'HumanEval/94 \u00b7 no tools', type: 'Heavy code', tkey: 'code', load: 'Very high', suite: 'heavy' },\n    { id: 'H1T', n: 12, title: 'Largest prime \u2192 digit sum', sub: 'HumanEval/94 \u00b7 tools offered', type: 'Heavy code', tkey: 'code', load: 'Very high', suite: 'heavy' },\n    { id: 'H2', n: 13, title: '5-year return difference', sub: 'Cadence vs NASDAQ \u00b7 no tools', type: 'Heavy finance', tkey: 'finance_calc', load: 'High', suite: 'heavy' },\n    { id: 'H2T', n: 14, title: '5-year return difference', sub: 'Cadence vs NASDAQ \u00b7 tools offered', type: 'Heavy finance', tkey: 'finance_calc', load: 'High', suite: 'heavy' },\n    { id: 'H3', n: 15, title: 'Total return on $100,000', sub: 'S&P 500 graph \u00b7 no tools', type: 'Heavy finance', tkey: 'finance_interp', load: 'High', suite: 'heavy' },\n    { id: 'H3T', n: 16, title: 'Total return on $100,000', sub: 'S&P 500 graph \u00b7 tools offered', type: 'Heavy finance', tkey: 'finance_interp', load: 'High', suite: 'heavy' },\n  ];\n\n  TYPEC = {\n    'Natural language': { c: '#3D7E8C', bg: '#EAF2F3' },\n    'Legal': { c: '#b0562e', bg: '#FBE7DD' },\n    'Math': { c: '#b0752e', bg: '#FBEFD8' },\n    'Logic': { c: '#3D7E8C', bg: '#EAF2F3' },\n    'Code': { c: '#5a6a72', bg: '#EEF0F1' },\n    'Open analysis': { c: '#b0562e', bg: '#FBE7DD' },\n    'Heavy code': { c: '#2C3A42', bg: '#E4E8EA' },\n    'Heavy finance': { c: '#8a6d3b', bg: '#F5EDDC' },\n  };\n\n  NUMCOLORS = [\n    'rgba(61,126,140,0.20)',\n    'rgba(114,189,197,0.28)',\n    'rgba(78,147,160,0.22)',\n    'rgba(212,149,42,0.26)',\n    'rgba(224,122,84,0.26)',\n    'rgba(232,105,74,0.24)',\n    'rgba(240,160,138,0.32)',\n    'rgba(192,112,90,0.26)',\n    'rgba(90,106,114,0.24)',\n    'rgba(44,58,66,0.20)',\n  ];\n\n  TYPEC2 = {\n    'Natural language': { c: '#3D7E8C', bg: '#E7F1F1' },\n    'Legal': { c: '#BE6A43', bg: '#FBEADF' },\n    'Math': { c: '#AE7B1E', bg: '#FAF0D6' },\n    'Logic': { c: '#4E93A0', bg: '#E6F1F2' },\n    'Code': { c: '#4A5860', bg: '#ECEEF0' },\n    'Open analysis': { c: '#C0705A', bg: '#FBEAE3' },\n    'Heavy code': { c: '#3A454C', bg: '#E6EAEC' },\n    'Heavy finance': { c: '#96773F', bg: '#F6EFE0' },\n  };\n\n  TS = {\n    raw: { label: 'Raw', word: 'raw', desc: 'Full thinking is visible', c: '#2A6F4F', bg: '#E7F2EC' },\n    raw_anchor: { label: 'Raw \u00b7 anchor', word: 'raw', desc: 'English reference trace (Gemma)', c: '#2A6F4F', bg: '#E7F2EC' },\n    summarized: { label: 'Summarized', word: 'summarized', desc: \"Provider's summary of the chain of thought \u2014 not the raw trace\", c: '#b0752e', bg: '#FBEFD8' },\n    count_only: { label: 'Count only', word: 'count-only', desc: 'Token count exposed, reasoning text hidden', c: '#b0562e', bg: '#FBE7DD' },\n    absent: { label: 'Hidden', word: 'hidden', desc: 'No reasoning text exposed', c: '#9A3B3B', bg: '#F6E0DE' },\n  };\n\n  GLOSSARY = [\n    { t: 'Reasoning tokens', d: 'Tokens the model spends thinking before it answers \u2014 hidden work you still pay for. On raw-trace models this is visible text; on others only the count is exposed.' },\n    { t: 'Input / Output tokens', d: 'Input is the prompt; output is the visible answer. Reasoning tokens are billed on top of both.' },\n    { t: 'Cost', d: \"The call's total price at each provider's per-token rate, summing input, reasoning and output.\" },\n    { t: 'Redundancy \u2014 1 to 5, lower is better', d: 'How much of the trace is wasted motion \u2014 re-deciding, circling, meta-filler \u2014 rather than progress. Scored by two independent judges (MiniMax and Gemini 3.1 Pro) against a fixed rubric.' },\n    { t: 'Coherence \u2014 1 to 5, higher is better', d: 'How well the trace holds together as a logical sequence. Reported as uniformly high, so it separates the models less than redundancy does.' },\n    { t: 'Trace status', d: 'Raw = full thinking visible. Summarized = the provider\\u2019s summary of the chain of thought. Count-only = token count exposed but text hidden. Hidden = no reasoning text at all.' },\n    { t: 'Correctness', d: 'Graded blind against a withheld answer key on the six factual tasks (math, logic, JSON, legal, code). Every model passed \u2014 48 of 48 verdicts.' },\n  ];\n\n  INSIGHTS = [\n    { t: \"Correctness doesn't separate them\", d: 'All eight models answered every graded task correctly \u2014 48 of 48 verdicts. On these tasks the question isn\\u2019t whether a model can reach the answer, but what it costs to get there.' },\n    { t: 'Reasoning is the main expense', d: 'For models with visible traces, thinking is roughly two-thirds to four-fifths of all tokens. The cost lives in the reasoning, not the final answer.' },\n    { t: 'More reasoning tokens \\u2260 more thinking', d: 'Much of the spread is waste, not thoroughness. GLM rea  (stats broken out so they line up across models)\n    const dcols = activeBlock.cols || [];\n    const valBase = { fontFamily: \"'IBM Plex Mono', monospace\", fontSize: '14px', color: '#2C3A42' };\n    const dataHeadStyle = { display: 'grid', gridTemplateColumns: '150px repeat(' + N + ', minmax(0, 1fr))', alignItems: 'center', columnGap: '16px', padding: '13px 18px', background: '#FBF9F5' };\n    const dataRowStyle = { display: 'grid', gridTemplateColumns: '150px repeat(' + N + ', minmax(0, 1fr))', alignItems: 'center', columnGap: '16px', padding: '12px 18px', borderTop: '1px solid #F3EEE4' };\n    const mkCell = (text, style, badge) => ({ text, style, badge: badge || '', hasBadge: !!badge });\n    const dataRows = [\n      { label: 'Input tokens', cells: dcols.map(c => mkCell(c.inputFmt, valBase)) },\n      { label: 'Output tokens', cells: dcols.map(c => mkCell(c.outputFmt, valBase)) },\n      { label: 'Response time', cells: dcols.map(c => mkCell(c.timeFmt, valBase)) },\n      { label: 'Cost', cells: dcols.map(c => mkCell(c.costFmt, c.bestCost ? { ...valBase, color: '#2A6F4F', fontWeight: 600 } : valBase, c.bestCost ? 'cheapest' : '')) },\n      { label: 'Redundancy \u2193', cells: dcols.map(c => mkCell(c.redFmt, { ...valBase, color: c.redColor, fontWeight: 600 }, c.bestRed ? 'tightest' : '')) },\n      { label: 'Coherence \u2191', cells: dcols.map(c => mkCell(c.cohFmt, { ...valBase, color: '#3D7E8C', fontWeight: 600 })) },\n    ];\n\n    // ---------- MODEL PICKER ----------\n    const pickerOpen = s.pickerSlot != null;\n    const pickerModels = this.MODELS.map(m => {\n      const inUse = s.slots.includes(m.id) && (s.pickerSlot == null || s.slots[s.pickerSlot] !== m.id);\n      const current = s.pickerSlot != null && s.slots[s.pickerSlot] === m.id;\n      return {\n        id: m.id, name: m.name, org: m.org, desc: this.DESC[m.id] || '',\n        dotStyle: { width: '11px', height: '11px', borderRadius: '999px', background: m.dot, flex: '0 0 auto', opacity: inUse ? 0.4 : 1 },\n        onClick: () => { if (!inUse) this.pickModel(m.id); },\n        rowStyle: { display: 'flex', alignItems: 'center', gap: '12px', width: '100%', textAlign: 'left', padding: '12px 13px', borderRadius: '11px', border: 'none', cursor: inUse ? 'default' : 'pointer', background: current ? '#EAF2F3' : 'transparent', opacity: inUse ? 0.5 : 1 },\n        stateLabel: current ? '\u2713 selected' : (inUse ? 'in use' : ''),\n        tagStyle: { fontFamily: \"'IBM Plex Mono', monospace\", fontSize: '10.5px', color: current ? '#2A6F4F' : '#a09c93', flex: '0 0 auto' },\n      };\n    });\n\n    // ---------- LEADERBOARD ----------\n    const filterDefs = [\n      { k: 'all', label: 'All light tasks' }, { k: 'da_natural_language', label: 'Natural language' }, { k: 'da_legal', label: 'Legal' },\n      { k: 'math', label: 'Math' }, { k: 'logic', label: 'Logic' }, { k: 'code', label: 'Code' }, { k: 'da_open_analysis', label: 'Open analysis' },\n      { k: 'heavy_base', label: 'Heavy \u00b7 no tools' }, { k: 'heavy_tools', label: 'Heavy \u00b7 tools offered' },\n    ];\n    const includedPrompts = this.PROMPTS.filter(p => {\n      if (s.typeFilter === 'heavy_base') return p.suite === 'heavy' && p.id.slice(-1) !== 'T';\n      if (s.typeFilter === 'heavy_tools') return p.suite === 'heavy' && p.id.slice(-1) === 'T';\n      if (p.suite === 'heavy') return false;\n      if (s.typeFilter === 'all') return true;\n      if (s.typeFilter === 'code') return p.tkey === 'code_structure' || p.tkey === 'code_bug';\n      return p.tkey === s.typeFilter;\n    });\n    const filterChips = filterDefs.map(f => ({ k: f.k, label: f.label, onClick: () => this.setState({ typeFilter: f.k }), styleObj: this.chipBtn(s.typeFilter === f.k) }));\n\n    let rows0 = this.MODELS.map(m => {\n      const cs = includedPrompts.map(p => this.cell(m.id, p.id)).filter(Boolean);\n      const reasSum = cs.reduce((a, c) => a + (c.reasoningTok || 0), 0);\n      const outSum = cs.reduce((a, c) => a + (c.outputTok || 0), 0);\n      // Prefer the real sum of all runs (costSumActual, heavy cells) over the\n      // single median-cost estimate. A light cell (n=1) has no costSumActual\n      // but its median IS the exact cost - that fallback isn't an estimate.\n      // Only mark the row indicative when a cell with n>1 actually lacks a\n      // real sum to fall back to.\n      let costIndicative = false;\n      const costSum = cs.reduce((a, c) => {\n        if (c.costSumActual != null) return a + c.costSumActual;\n        if ((c.n || 1) > 1) costIndicative = true;\n        return a + (c.cost || 0);\n      }, 0);\n      const redJ = cs.flatMap(c => (c.judges || []).map(j => j.redundancy)).filter(x => x != null);\n      const cohJ = cs.flatMap(c => (c.judges || []).map(j => j.coherence)).filter(x => x != null);\n      const avgRed = redJ.length ? redJ.reduce((a, b) => a + b, 0) / redJ.length : null;\n      const avgCoh = cohJ.length ? cohJ.reduce((a, b) => a + b, 0) / cohJ.length : null;\n      const graded = cs.filter(c => c.correct != null);\n      const corr = graded.reduce((a, c) => a + (c.correctN != null ? c.correctN : (c.correct ? 1 : 0)), 0);\n      const gradedN = graded.reduce((a, c) => a + (c.correctN != null ? c.n : 1), 0);\n      const anyTs = cs.length ? this.TS[cs[0].regime === 'raw_anchor' ? 'raw_anchor' : cs[0].ts] : null;\n      return { m, reasSum, outSum, costSum, avgRed, avgCoh, corr, costIndicative, gradedTotal: gradedN, tsWord: anyTs ? anyTs.word : '\\u2014' };\n    });\n\n    const maxReasL = Math.max(1, ...rows0.map(r => r.reasSum));\n    const maxOutL = Math.max(1, ...rows0.map(r => r.outSum));\n    const maxCostL = Math.max(1e-9, ...rows0.map(r => r.costSum));\n\n    const sk = s.sortKey, dir = s.sortDir;\n    const val = (r) => ({ reasSum: r.reasSum, outSum: r.outSum, costSum: r.costSum, redundancy: r.avgRed, coherence: r.avgCoh, correct: r.gradedTotal ? r.corr / r.gradedTotal : 0 })[sk];\n    rows0.sort((a, b) => {\n      let va = val(a), vb = val(b);\n      const na = va == null, nb = vb == null;\n      if (na && nb) return 0;\n      if (na) return 1;\n      if (nb) return -1;\n      return dir === 'asc' ? va - vb : vb - va;\n    });\n\n    const rows = rows0.map((r, i) => {\n      const redColor = r.avgRed == null ? '#9a978f' : (r.avgRed <= 1.9 ? '#2A6F4F' : (r.avgRed >= 2.8 ? '#b0562e' : '#3A454C'));\n      const cellPad = { padding: '0 8px' };\n      const hi = (key) => sk === key ? { ...cellPad, background: '#FBF8F1', borderRadius: '8px', padding: '8px' } : cellPad;\n      return {\n        rank: i + 1, rankColor: i === 0 ? '#3D7E8C' : '#b3afa5',\n        name: r.m.name, org: r.m.org, tsWord: r.tsWord,\n        dotStyle: { width: '10px', height: '10px', borderRadius: '999px', background: r.m.dot, flex: '0 0 auto' },\n        rowStyle: { display: 'grid', gridTemplateColumns: '44px 1.6fr repeat(6, 1fr)', alignItems: 'center', padding: '14px 20px', borderBottom: i === rows0.length - 1 ? 'none' : '1px solid #F3EEE4', background: i === 0 ? '#FCFBF8' : '#FFFFFF' },\n        reasFmt: this.fmtInt(r.reasSum), outFmt: this.fmtInt(r.outSum), costFmt: this.fmtCost(r.costSum),\n        costIndicativeMark: r.costIndicative ? ' ~' : '',\n        costTitle: r.costIndicative ? 'indicative - includes at least one multi-run cell with no recorded per-pass cost sum; falling back to median x 1' : 'sum of actual per-run cost across all included cells',\n        redFmt: r.avgRed == null ? '\\u2014' : r.avgRed.toFixed(2), cohFmt: r.avgCoh == null ? '\\u2014' : r.avgCoh.toFixed(2), redColor,\n        corrFmt: r.gradedTotal ? (r.corr + '/' + r.gradedTotal) : '\\u2014',\n        reasBar: { width: Math.round(r.reasSum / maxReasL * 100) + '%', height: '100%', background: '#72BDC5', borderRadius: '3px' },\n        outBar: { width: Math.round(r.outSum / maxOutL * 100) + '%', height: '100%', background: '#E0C58A', borderRadius: '3px' },\n        costBar: { width: Math.round(r.costSum / maxCostL * 100) + '%', height: '100%', background: '#F0A08A', borderRadius: '3px' },\n        reasCellStyle: hi('reasSum'), outCellStyle: hi('outSum'), costCellStyle: hi('costSum'),\n        redCellStyle: hi('redundancy'), cohCellStyle: hi('coherence'), corrCellStyle: hi('correct'),\n      };\n    });\n\n    const colDefs = [\n      { key: 'reasSum', label: 'Reasoning', hint: 'Total reasoning tokens \u2014 lower is leaner' },\n      { key: 'outSum', label: 'Output', hint: 'Total output tokens' },\n      { key: 'costSum', label: 'Cost', hint: 'Total cost \u2014 lower is cheaper' },\n      { key: 'redundancy', label: 'Redundancy', hint: '1\u20135, lower is better' },\n      { key: 'coherence', label: 'Coherence', hint: '1\u20135, higher is better' },\n      { key: 'correct', label: 'Correct', hint: 'Graded tasks passed' },\n    ];\n    const headBase = { border: 'none', background: 'none', cursor: 'pointer', textAlign: 'left', padding: 0, fontFamily: \"'IBM Plex Mono', monospace\", fontSize: '10.5px', letterSpacing: '0.04em', textTransform: 'uppercase' };\n    const columns = colDefs.map(c => ({\n      key: c.key, label: c.label, hint: c.hint, onClick: () => this.setSort(c.key),\n      arrow: sk === c.key ? (dir === 'asc' ? ' \\u2191' : ' \\u2193') : '',\n      headStyle: { ...headBase, color: sk === c.key ? '#3D7E8C' : '#8a8880', fontWeight: sk === c.key ? 600 : 500 },\n    }));\n\n    const outlineBtn = (on) => ({ fontFamily: \"'Helvetica Neue', Helvetica, Arial, sans-serif\", fontSize: '13px', fontWeight: 500, padding: '9px 15px', borderRadius: '10px', cursor: 'pointer', border: '1px solid ' + (on ? '#3D7E8C' : '#E4DED2'), background: on ? '#EAF2F3' : '#FFFFFF', color: on ? '#2c5a66' : '#6b7178', transition: 'all .12s' });\n\n    return {\n      panelSummary: this.MODELS.length + ' models \u00b7 ' + this.PROMPTS.length + ' tasks',\n      isCompare: compareTab, isLeaderboard: !compareTab,\n      onCompare: () => this.setState({ view: 'compare' }), onLeaderboard: () => this.setState({ view: 'leaderboard' }),\n      compareTabStyle: compareTab ? tabOn : tabOff, leaderTabStyle: compareTab ? tabOff : tabOn,\n      loaded, notLoaded: !loaded && !s.loadErr,\n      stageW1: s.stage === 'w1', stageW2: s.stage === 'w2', stageApp: s.stage === 'app',\n\n      // wizard step 1\n      w1Cards, w1TrackStyle, w1Dots, selectedCards,\n      w1SelCount: s.selPrompts.length, w1NoSelection: !w1Has,\n      onW1Prev: () => this.w1Prev(), onW1Next: () => this.w1Next(),\n      w1PrevStyle: arrowBig(s.w1idx === 0), w1NextArrowStyle: arrowBig(s.w1idx === this.PROMPTS.length - 1),\n      onGoStep2: () => this.goStep2(), continueBtnStyle,\n\n      // wizard step 2\n      modelSlots, quickSets, canAddSlot: s.slots.length < 4, onAddSlot: () => this.addSlot(),\n      onBackStep1: () => this.backStep1(), onFinishWizard: () => this.finishWizard(), compareBtnStyle,\n      w2Hint: filled.length < 2 ? 'Pick at least 2 models' : (filled.length + ' models ready'),\n\n      // board\n      editOpen: s.editOpen, onToggleEdit: () => this.setState(st => ({ editOpen: !st.editOpen })),\n      editBtnStyle: { border: '1px solid ' + (s.editOpen ? '#3D7E8C' : '#E4DED2'), background: s.editOpen ? '#EAF2F3' : '#FFFFFF', color: s.editOpen ? '#2c5a66' : '#6b7178', fontFamily: \"'IBM Plex Mono', monospace\", fontSize: '12px', padding: '9px 15px', borderRadius: '10px', cursor: 'pointer' },\n      editBtnLabel: s.editOpen ? '\u2715 Close editor' : '\u270e Edit selection',\n      onToggleHighlight: () => this.setState({ highlight: !highlight }),\n      hlTrackStyle: { width: '36px', height: '21px', borderRadius: '999px', background: highlight ? '#3D7E8C' : '#DDD6C9', position: 'relative', transition: 'background .15s', flex: '0 0 auto' },\n      hlKnobStyle: { position: 'absolute', top: '2px', left: highlight ? '17px' : '2px', width: '17px', height: '17px', borderRadius: '999px', background: '#FFFFFF', transition: 'left .15s', boxShadow: '0 1px 2px rgba(0,0,0,0.2)' },\n      ucChips, ucCount: ordered.length, ucDots,\n      ucPosLabel: ordered.length ? ((activeUc + 1) + ' / ' + ordered.length) : '',\n      onUcPrev: () => this.ucPrev(), onUcNext: () => this.ucNext(),\n      ucPrevStyle: arrowBig(activeUc === 0 || ordered.length === 0), ucNextStyle: arrowBig(activeUc >= ordered.length - 1 || ordered.length === 0),\n      onEditUcs: () => this.setState({ stage: 'w1' }),\n      gridStyle, activeTaskCard, dataRows, dataHeadStyle, dataRowStyle,\n      hasActive, activeBlock,\n      noModels: s.stage === 'app' && filled.length === 0,\n      noUcsBoard: ordered.length === 0,\n      noUcsBoardMain: s.stage === 'app' && filled.length > 0 && ordered.length === 0,\n\n      // picker\n      pickerOpen, pickerModels, onClosePicker: () => this.closePicker(), onStopProp: (e) => { if (e && e.stopPropagation) e.stopPropagation(); },\n\n      // leaderboard\n      filterChips, columns, rows, includedCount: includedPrompts.length,\n      glossary: this.GLOSSARY, insights: this.INSIGHTS,\n      showGlossary: s.showGlossary, showReport,\n      onToggleGlossary: () => this.setState({ showGlossary: !s.showGlossary }),\n      onToggleReport: () => this.setState({ showReport: !showReport }),\n      glossaryBtnStyle: outlineBtn(s.showGlossary), glossaryBtnLabel: (s.showGlossary ? 'Hide' : 'Show') + ' terminology',\n      reportBtnStyle: outlineBtn(showReport), reportBtnLabel: (showReport ? 'Hide' : 'Show') + ' study findings',\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"</script>
