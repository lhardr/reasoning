# Model panel configuration.
# trace_exposure is our EXPECTED classification per provider docs (June 2026).
# The smoke test verifies this empirically and flags mismatches.
#
# openrouter_model_id: confirmed against live OpenRouter catalog 2026-06-25.
# model_id: for the direct provider API (when direct key is present).
# Verify both against provider docs before each production run.

# Experiment-level constants — recorded on every result row.
# reasoning_effort MUST be identical across all runs in a comparison set.
# Changing it invalidates cross-model comparisons.
experiment:
  reasoning_effort: "high"   # OpenRouter reasoning.effort for applicable models

models:
  deepseek_v4:
    provider: deepseek
    role: scored
    trace_exposure: raw
    model_id: deepseek-reasoner                   # Direct DeepSeek API model ID (verify before run)
    openrouter_model_id: deepseek/deepseek-v4-pro # Confirmed 2026-06-25: DeepSeek V4 Pro reasoning
    thinking_budget: 4096
    base_url: https://api.deepseek.com

  glm_5_2:
    provider: zai
    role: scored
    trace_exposure: raw
    model_id: glm-z1-air                          # Direct Z.ai API model ID (verify before run)
    openrouter_model_id: z-ai/glm-5.2             # Confirmed 2026-06-25: GLM 5.2 reasoning model
    thinking_budget: 4096
    base_url: https://open.bigmodel.cn/api/paas/v4/

  kimi_k2_7:
    provider: moonshot
    role: scored
    trace_exposure: raw
    model_id: moonshot-v1-thinking                # Direct Moonshot API model ID (verify before run)
    # kimi-k2.7-code is the K2.7 build available on OpenRouter (coding-focused).
    # For general K2.7 reasoning, use the direct Moonshot API with MOONSHOT_API_KEY.
    openrouter_model_id: moonshotai/kimi-k2.7-code  # Confirmed 2026-06-25: K2.7 code variant
    thinking_budget: 4096
    base_url: https://api.moonshot.cn/v1

  gpt_5_5:
    provider: openai
    role: scored
    trace_exposure: count_only
    model_id: gpt-5.5                             # Direct OpenAI API model ID
    openrouter_model_id: openai/gpt-5.5           # Confirmed 2026-06-25: exact GPT-5.5 match
    thinking_budget: 4096

  claude_sonnet_4_6:
    provider: anthropic
    role: scored
    trace_exposure: summarized
    model_id: claude-sonnet-4-6                   # Direct Anthropic API model ID
    openrouter_model_id: anthropic/claude-sonnet-4.6  # Confirmed 2026-06-25: exact Sonnet 4.6 match
    thinking_budget: 4096

  gemma_4:
    provider: gemma
    role: anchor
    trace_exposure: raw
    model_id: google/gemma-4-31b-it               # OpenRouter model ID (Gemma 4 runs via OpenRouter)
    openrouter_model_id: google/gemma-4-31b-it    # Confirmed 2026-06-25: Gemma 4 31B instruction-tuned
    thinking_budget: 4096

  opus_4_8:
    provider: anthropic
    role: scored
    trace_exposure: summarized          # Claude exposes summarized CoT. Same constraint as claude_sonnet_4_6.
    model_id: claude-opus-4-8           # Confirmed OpenRouter 2026-06-26
    openrouter_model_id: anthropic/claude-opus-4.8  # Confirmed OpenRouter 2026-06-26
    thinking_budget: 4096

  mistral_medium_3_5:
    provider: mistral
    role: scored
    trace_exposure: raw                 # EXPECTED. Smoke test MUST confirm OpenRouter returns raw trace.
                                        # If not: stop, correct trace_exposure, report before proceeding.
    model_id: mistral-medium-3.5        # Confirmed OpenRouter 2026-06-26
    openrouter_model_id: mistralai/mistral-medium-3.5  # Confirmed OpenRouter 2026-06-26
    thinking_budget: 4096

  minimax:
    provider: minimax
    role: judge
    trace_exposure: null                          # unused Phase 0
    model_id: minimax-m3                          # Confirmed 2026-06-25: MiniMax M3 (latest)
    openrouter_model_id: minimax/minimax-m3

  gemini_3_1_pro:
    provider: google
    role: judge
    trace_exposure: null                          # unused Phase 0
    model_id: gemini-3.1-pro-preview              # Confirmed 2026-06-25: Gemini 3.1 Pro Preview
    openrouter_model_id: google/gemini-3.1-pro-preview
